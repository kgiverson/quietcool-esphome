# QuietCool Smart Attic Fan Control Configuration
# This configuration file enables control of a QuietCool Smart Attic Fan Control via ESPHome
# It provides BLE connectivity, fan speed control, timer functionality, and sensor monitoring

# Core Configuration
# ----------------------------------------
# Define BLE service and characteristic UUIDs used for communication with the fan
substitutions:
  service_uuid: "000000ff-0000-1000-8000-00805f9b34fb"
  characteristic_uuid: "0000ff01-0000-1000-8000-00805f9b34fb"
  mac_address: "00:00:00:00:00:00"
  fan_speed_count: "2"

# Basic ESPHome device configuration
esphome:
  name: quietcool-fan
  friendly_name: QuietCool Fan
  name_add_mac_suffix: true

# Hardware configuration for ESP32 development board
esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable Home Assistant API integration
api:

# Enable Over-The-Air updates
ota:
  - platform: esphome

# Enable captive portal for initial WiFi setup
captive_portal:

# WiFi configuration with fallback access point
wifi:
  ap:

# BLE configuration for connecting to the QuietCool fan
# Uses passive scanning to preserve battery life
esp32_ble_tracker:
  scan_parameters:
    active: false

# BLE client configuration for maintaining connection with the fan
# Automatically connects and sends login credentials on connection
ble_client:
  - mac_address: ${mac_address}
    id: qc_ble
    auto_connect: true
    on_connect:
      - delay: 2s
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":13,\"P\":\"" + id(pair_id).state + "\"}";
      - script.wait: send_ble_msg

# Global Variables and Utilities
# ----------------------------------------
# Enable JSON parsing for BLE communication
json:

# Global variable to store BLE messages
globals:
  - id: ble_message
    type: std::string
    initial_value: ""
    restore_value: no

# Configure logging level
logger:
  level: INFO

# Fan Control Scripts
# ----------------------------------------
# Scripts handle different aspects of fan control:
# - set_mode: Changes fan operation mode (Run/Timer/TH/Idle)
# - set_speed: Configures continuous manual-run speed
# - set_timer: Configures timer duration and speed
# - start_manual_run: Starts continuous Run mode, with a long-timer fallback for Medium
# - start_selected_mode: Starts the mode selected in Home Assistant
# - send_ble_msg: Handles BLE message transmission
script:
  - id: set_mode
    parameters:
      mode: string
    then:
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":9,\"M\":\"" + mode + "\"}";
      - script.wait: send_ble_msg
  - id: set_speed
    parameters:
      speed: string
    then:
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":18,\"S\":\"" + speed + "\"}";
      - script.wait: send_ble_msg
  - id: set_timer
    parameters:
      hours: int
      minutes: int
      speed: string
    then:
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":7,\"H\":" + std::to_string(hours) + ",\"M\":" + std::to_string(minutes) + ",\"R\":\"" + speed + "\"}";
      - script.wait: send_ble_msg
  - id: start_manual_run
    parameters:
      speed: string
    then:
      - if:
          condition:
            lambda: return speed == "MEDIUM";
          then:
            # V2 Run-mode SetSpeed only accepts LOW/HIGH. Timer mode is the
            # known-working way to select MEDIUM on three-speed controllers.
            - script.execute:
                id: set_timer
                speed: "MEDIUM"
                hours: 23
                minutes: 59
            - script.wait: set_timer
            - script.execute:
                id: set_mode
                mode: "Timer"
            - script.wait: set_mode
          else:
            - script.execute:
                id: set_speed
                speed: !lambda return speed;
            - script.wait: set_speed
            - script.execute:
                id: set_mode
                mode: "Run"
            - script.wait: set_mode
  - id: start_selected_mode
    then:
      - if:
          condition:
            lambda: return id(operating_mode).current_option() == "Manual Run";
          then:
            - script.execute:
                id: start_manual_run
                speed: !lambda return id(manual_speed).current_option().str();
            - script.wait: start_manual_run
          else:
            - if:
                condition:
                  lambda: return id(operating_mode).current_option() == "Timer Run";
                then:
                  - script.execute:
                      id: set_timer
                      speed: !lambda return id(manual_speed).current_option().str();
                      hours: !lambda return id(timer_hours).state;
                      minutes: !lambda return id(timer_minutes).state;
                  - script.wait: set_timer
                  - script.execute:
                      id: set_mode
                      mode: "Timer"
                  - script.wait: set_mode
                else:
                  - script.execute:
                      id: set_mode
                      mode: "TH"
                  - script.wait: set_mode
  - id: send_ble_msg
    parameters:
      msg: string
    mode: queued
    then:
      - ble_client.ble_write:
          id: qc_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${characteristic_uuid}
          value: !lambda |-
              ESP_LOGI("quietcool", "Sending BLE message: %s", msg.c_str());
              return std::vector<uint8_t>(msg.begin(), msg.end());
      - delay: 1s

# Fan Component Configuration
# ----------------------------------------
# Template-based fan platform that provides:
# - Two speed levels (LOW/HIGH)
# - Continuous manual operation
# - State restoration after power loss
fan:
  - platform: template
    name: "QuietCool Fan"
    id: quietcool_fan
    has_direction: false
    has_oscillating: false
    speed_count: ${fan_speed_count}
    restore_mode: RESTORE_DEFAULT_OFF
    on_speed_set:
      - logger.log: "Setting speed"
      - script.execute:
          id: start_manual_run
          speed: !lambda |-
            if (x == ${fan_speed_count}) return "HIGH";
            if (${fan_speed_count} == 3 && x == 2) return "MEDIUM";
            return "LOW";
      - script.wait: start_manual_run
    on_turn_on:
      - logger.log: "Turning on selected operating mode"
      - script.execute:
          id: start_selected_mode
      - script.wait: start_selected_mode
      - event.trigger:
          id: fan_on_event
          event_type: fan_on
    on_turn_off:
      - logger.log: "Turning off"
      - script.execute:
          id: set_mode
          mode: "Idle"
      - script.wait: set_mode
      - event.trigger:
          id: fan_off_event
          event_type: fan_off

# Timer Controls
# ----------------------------------------
# Provides user-adjustable timer settings:
# - Hours (0-23)
# - Minutes (0-59)
# Updates are sent to the fan immediately when values change
number:
  - platform: template
    name: "Timer Hours"
    id: timer_hours
    min_value: 0
    max_value: 23
    step: 1
    unit_of_measurement: "h"
    device_class: duration
    optimistic: true
    initial_value: 3
    on_value:
      - script.execute:
          id: set_timer
          hours: !lambda return x;
          minutes: !lambda return id(timer_minutes).state;
          speed: &set_timer_speed !lambda |-
            if (id(quietcool_fan).speed == ${fan_speed_count}) return "HIGH";
            if (${fan_speed_count} == 3 && id(quietcool_fan).speed == 2) return "MEDIUM";
            return "LOW";

  - platform: template
    name: "Timer Minutes"
    id: timer_minutes
    min_value: 0
    max_value: 59
    step: 1
    unit_of_measurement: "m"
    device_class: duration
    optimistic: true
    initial_value: 0
    on_value:
      - script.execute:
          id: set_timer
          hours: !lambda return id(timer_hours).state;
          minutes: !lambda return x;
          speed: *set_timer_speed

# Operating Mode Control
# ----------------------------------------
# Manual Run runs continuously at the selected speed.
# Timer Run runs at the selected speed for the configured timer duration.
# Smart Temperature & Humidity uses the thresholds stored in the controller.
select:
  - platform: template
    name: "Manual Speed"
    id: manual_speed
    options:
      - "LOW"
      - "MEDIUM"
      - "HIGH"
    optimistic: true
    initial_option: "LOW"
    on_value:
      - if:
          condition:
            lambda: return id(quietcool_fan).state;
          then:
            - if:
                condition:
                  lambda: return id(operating_mode).current_option() == "Manual Run";
                then:
                  - script.execute:
                      id: start_manual_run
                      speed: !lambda return x;
                  - script.wait: start_manual_run
                else:
                  - if:
                      condition:
                        lambda: return id(operating_mode).current_option() == "Timer Run";
                      then:
                        - script.execute:
                            id: set_timer
                            speed: !lambda return x;
                            hours: !lambda return id(timer_hours).state;
                            minutes: !lambda return id(timer_minutes).state;
                        - script.wait: set_timer
                        - script.execute:
                            id: set_mode
                            mode: "Timer"
                        - script.wait: set_mode

  - platform: template
    name: "Operating Mode"
    id: operating_mode
    options:
      - "Manual Run"
      - "Timer Run"
      - "Smart Temperature & Humidity"
    optimistic: true
    initial_option: "Manual Run"
    on_value:
      - if:
          condition:
            lambda: return id(quietcool_fan).state;
          then:
            - script.execute:
                id: start_selected_mode
            - script.wait: start_selected_mode

# Device Configuration
# ----------------------------------------
# Stores device pairing ID and provides pairing button
# The pair ID is a 16-character hex string used for device authentication
text:
  - id: pair_id
    name: "Pair ID"
    platform: template
    mode: text
    min_length: 16
    max_length: 16
    optimistic: true
    initial_value: "a1b2c1d2a2b1c2d1"
    restore_value: true

button:
  - platform: template
    name: "Pair BLE"
    id: pair_button
    on_press:
      then:
        - script.execute:
            id: send_ble_msg
            msg: !lambda return "{\"A\":14,\"P\":\"" + id(pair_id).state + "\"}";
        - script.wait: send_ble_msg
        - delay: 2s
        - script.execute:
            id: send_ble_msg
            msg: !lambda return "{\"A\":13,\"P\":\"" + id(pair_id).state + "\"}";
        - script.wait: send_ble_msg

# Sensor Templates and Configurations
# ----------------------------------------
# Define reusable sensor templates for temperature and humidity
# These sensors receive data from the fan's built-in sensors
.humidity_sensor: &humidity_sensor
  platform: template
  unit_of_measurement: "%"
  device_class: humidity
  state_class: measurement

.temperature_sensor: &temperature_sensor
  platform: template
  unit_of_measurement: "°F"
  device_class: temperature
  state_class: measurement

sensor:
  - <<: *humidity_sensor
    name: humidity
    id: humidity
  - <<: *temperature_sensor
    name: temperature
    id: temperature
  - <<: *temperature_sensor
    name: temp_sample
    id: temp_sample
  - <<: *humidity_sensor
    name: humidity_sample
    id: humidity_sample
  - <<: *temperature_sensor
    name: get_temp_h
    id: get_temp_h
    disabled_by_default: true
  - <<: *temperature_sensor
    name: get_temp_m
    id: get_temp_m
    disabled_by_default: true
  - <<: *humidity_sensor
    name: get_hum_h
    id: get_hum_h
    disabled_by_default: true
  - <<: *temperature_sensor
    name: get_temp_l
    id: get_temp_l
    disabled_by_default: true
  - <<: *humidity_sensor
    name: get_hum_l
    id: get_hum_l
    disabled_by_default: true
  - platform: template
    name: get_hour
    id: get_hour
    unit_of_measurement: "h"
    device_class: duration
    accuracy_decimals: 0
    disabled_by_default: true
  - platform: template
    name: get_minute
    id: get_minute
    unit_of_measurement: "m"
    device_class: duration
    accuracy_decimals: 0
    disabled_by_default: true

# Text Sensors and BLE Data Handling
# ----------------------------------------
# Various text sensors for monitoring fan state and settings
# The BLE data handler parses incoming JSON messages and updates appropriate sensors
text_sensor:
  - platform: template
    name: mode
    id: mode
  - platform: template
    name: range
    id: range
  - platform: template
    name: fan_type
    id: fan_type
    disabled_by_default: true
  - platform: template
    name: name
    id: name
    disabled_by_default: true
  - platform: template
    name: model
    id: model
    disabled_by_default: true
  - platform: template
    name: serial_num
    id: serial_num
    disabled_by_default: true
  - platform: template
    name: sensor_state
    id: sensor_state
    disabled_by_default: true
  - platform: template
    name: pair_state
    id: pair_state
  - platform: template
    name: get_hum_range
    id: get_hum_range
    disabled_by_default: true
  - platform: template
    name: get_time_range
    id: get_time_range
    disabled_by_default: true
  - platform: ble_client
    name: "BLE Data"
    id: quietcool_ble_data
    service_uuid: ${service_uuid}
    characteristic_uuid: ${characteristic_uuid}
    notify: true
    internal: true
    on_notify:
      - lambda: |-
            static std::string& accumulated = id(ble_message);
            accumulated += x;

            // Some controllers prefix responses with an acknowledgement such as
            // "QQ". Discard everything before the first JSON object.
            size_t json_start = accumulated.find('{');
            if (json_start == std::string::npos) {
              if (accumulated.size() > 256) {
                accumulated.clear();
              }
              return;
            }
            if (json_start > 0) {
              accumulated.erase(0, json_start);
            }

            if (!x.empty() && x.back() == '}') {
              bool parsed = false;
              json::parse_json(accumulated, [&parsed](JsonObject root) -> bool {
                parsed = true;
                
                int api = root["A"] | 0;

                for (JsonObject::iterator it = root.begin(); it != root.end(); ++it) {
                  std::string key = it->key().c_str();
                  if (key == "A") continue;

                  if (api == 1) {
                    if (key == "C") continue;
                    if (key == "M") { id(mode).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "R") { id(range).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "S") { id(sensor_state).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "T") { id(temp_sample).publish_state(it->value().as<float>() / 10.0f); continue; }
                    if (key == "H") { id(humidity_sample).publish_state(it->value().as<float>()); continue; }
                  }

                  if (api == 2) {
                    if (key == "B") { id(mode).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "C") { id(fan_type).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "D") { id(get_temp_h).publish_state(it->value().as<float>()); continue; }
                    if (key == "E") { id(get_temp_m).publish_state(it->value().as<float>()); continue; }
                    if (key == "F") { id(get_temp_l).publish_state(it->value().as<float>()); continue; }
                    if (key == "G") { id(get_hum_h).publish_state(it->value().as<float>()); continue; }
                    if (key == "H") { id(get_hum_l).publish_state(it->value().as<float>()); continue; }
                    if (key == "I") { id(get_hum_range).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "J") { id(get_hour).publish_state(it->value().as<float>()); continue; }
                    if (key == "K") { id(get_minute).publish_state(it->value().as<float>()); continue; }
                    if (key == "L") { id(get_time_range).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "M") { id(pair_state).publish_state(it->value().as<std::string>()); continue; }
                  }

                  if (api == 17) {
                    if (key == "G") continue;
                    if (key == "N") { id(name).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "M") { id(model).publish_state(it->value().as<std::string>()); continue; }
                    if (key == "S") { id(serial_num).publish_state(it->value().as<std::string>()); continue; }
                  }

                  ESP_LOGD("quietcool", "No mapping for API %d key: %s", api, key.c_str());
                }
                
                return true;
              });
              if (parsed) {
                id(quietcool_ble_data).publish_state(accumulated);
                ESP_LOGD("quietcool", "Received JSON data: %s", accumulated.c_str());
                accumulated.clear();
              } else if (accumulated.size() > 4096) {
                ESP_LOGW("quietcool", "Discarding oversized invalid JSON response");
                accumulated.clear();
              }
            }

# Periodic Updates
# ----------------------------------------
# Polls the fan every 15 seconds for:
# - Current parameters
# - Work state
# - Fan information
# This ensures the Home Assistant interface stays in sync with the actual fan state
interval:
  - interval: 15s
    then:
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":2}";
      - script.wait: send_ble_msg
      - delay: 5s
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":1}";
      - script.wait: send_ble_msg
      - delay: 5s
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":17}";
      - script.wait: send_ble_msg

time:
  - platform: homeassistant
    id: homeassistant_time

event:
  - platform: template
    name: Fan On Event
    id: fan_on_event
    event_types:
      - fan_on
  - platform: template
    name: Fan Off Event
    id: fan_off_event
    event_types:
      - fan_off
